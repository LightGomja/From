<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Field Ministry Tracker</title>
    <style>
        :root {
            --blue: #1a56db; --blue-light: #e8f0fe; --green: #057a55;
            --white: #ffffff; --gray-100: #f3f4f6; --gray-700: #374151;
        }
        body { font-family: -apple-system, sans-serif; background: var(--gray-100); margin: 0; padding: 10px; color: var(--gray-700); }
        .container { max-width: 600px; margin: 0 auto; background: var(--white); border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .tabs { display: flex; border-bottom: 1px solid #ddd; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-weight: 600; background: #f8fafc; }
        .tab.active { background: var(--white); color: var(--blue); border-bottom: 3px solid var(--blue); }
        .page { display: none; padding: 20px; }
        .page.active { display: block; }
        .section { margin-bottom: 25px; border: 1px solid #eee; border-radius: 8px; padding: 15px; }
        .section-header { font-weight: bold; margin-bottom: 15px; color: var(--blue); border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .field { margin-bottom: 15px; }
        label { display: block; font-size: 14px; margin-bottom: 5px; font-weight: 500; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .btn-add { background: var(--blue-light); color: var(--blue); border: 1px dashed var(--blue); padding: 10px; width: 100%; border-radius: 6px; cursor: pointer; margin-top: 10px; }
        .submit-btn { background: var(--green); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .search-results { position: absolute; background: white; border: 1px solid #ddd; width: 100%; z-index: 100; max-height: 200px; overflow-y: auto; display: none; }
        .search-results div { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; }
        .search-results div:hover { background: #f0f7ff; }
        .multi-choice { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .multi-choice label { font-weight: normal; display: flex; align-items: center; gap: 5px; }
        .multi-choice input { width: auto; }
    </style>
</head>
<body>
    <div class="container">
        <div class="tabs">
            <div class="tab active" onclick="switchTab(1)">Field Visit</div>
            <div class="tab" onclick="switchTab(2)">Partnership</div>
        </div>

        <div id="page1" class="page active">
            <div class="section">
                <div class="section-header">Basic Info</div>
                <div class="field">
                    <label>Staff (Assigned Area)</label>
                    <input type="text" id="fv-staff-search" placeholder="Search Staff Name...">
                    <div id="fv-staff-results" class="search-results"></div>
                </div>
                <div class="field">
                    <label>Church</label>
                    <input type="text" id="fv-church-search" placeholder="Search Church Name...">
                    <div id="fv-church-results" class="search-results"></div>
                </div>
                <div class="field">
                    <label>Date</label>
                    <input type="date" id="fv-date">
                </div>
            </div>

            <div class="section">
                <div class="section-header">Visit Details</div>
                <div class="field">
                    <label>Visit Type</label>
                    <select id="fv-type">
                        <option value="First Visit">First Visit</option>
                        <option value="Follow-up">Follow-up</option>
                        <option value="Meeting">Meeting</option>
                    </select>
                </div>
                <div class="field">
                    <label>Ministry Promoted</label>
                    <div class="multi-choice" id="fv-ministry-options">
                        <label><input type="checkbox" value="Home Group"> Home Group</label>
                        <label><input type="checkbox" value="Scripture Engagement"> Scripture Engagement</label>
                        <label><input type="checkbox" value="TTB Nepali App"> TTB App</label>
                        <label><input type="checkbox" value="Social Media"> Social Media</label>
                        <label><input type="checkbox" value="Radio FM"> Radio FM</label>
                        <label><input type="checkbox" value="Bible Quiz"> Bible Quiz</label>
                    </div>
                </div>
                <div class="field">
                    <label>Time Spent (Minutes)</label>
                    <input type="number" id="fv-duration" placeholder="e.g. 60">
                </div>
            </div>

            <div class="section">
                <div class="section-header">Contacts Present</div>
                <div id="fv-contacts-container"></div>
                <button class="btn-add" onclick="addContactField()">+ Add Person Met</button>
            </div>

            <button class="submit-btn" onclick="submitFieldVisit()">Submit Visit</button>
        </div>

        <div id="page2" class="page">
            <div class="section">
                <div class="section-header">Church Onboarding</div>
                <div class="field"><label>Church Name</label><input type="text" id="cp-church-name"></div>
                <div class="field"><label>Pastor Name</label><input type="text" id="cp-pastor"></div>
                <div class="field">
                    <label>Province</label>
                    <select id="cp-province">
                        <option value="Provence 1">Province 1</option>
                        <option value="Provence 2">Province 2</option>
                        <option value="Provence 3">Province 3</option>
                        <option value="Provence 4">Province 4</option>
                        <option value="Provence 5">Province 5</option>
                        <option value="Provence 6">Province 6</option>
                        <option value="Provence 7">Province 7</option>
                    </select>
                </div>
                <div class="field"><label>District</label><input type="text" id="cp-district"></div>
                <div class="field"><label>Tole/Village</label><input type="text" id="cp-village"></div>
            </div>
            <button class="submit-btn" onclick="submitPartnership()">Register Partner Church</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
